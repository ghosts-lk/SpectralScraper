<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectral Scraper - Enterprise Lead Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2/dist/Recharts.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .gradient-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); }
    .metric { font-size: 2.5rem; font-weight: 700; }
    .stat-card { border-left: 4px solid #667eea; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script type="module">
    // Real-time dashboard application
    const API_BASE = 'http://localhost:3000/api';

    class Dashboard {
      constructor() {
        this.stats = { total_leads: 0, verified_leads: 0, avg_score: 0, unique_companies: 0 };
        this.leads = [];
        this.operations = [];
        this.init();
      }

      async init() {
        this.render();
        this.loadStats();
        this.loadLeads();
        setInterval(() => this.loadStats(), 5000);
        setInterval(() => this.loadLeads(), 3000);
      }

      async loadStats() {
        try {
          const res = await fetch(`${API_BASE}/bulk/stats/global`);
          const data = await res.json();
          this.stats = data;
          this.updateStatsUI();
        } catch (e) {
          console.error('Failed to load stats:', e);
        }
      }

      async loadLeads() {
        try {
          const res = await fetch(`${API_BASE}/leads?limit=100`);
          const data = await res.json();
          this.leads = data.leads || [];
          this.updateLeadsUI();
        } catch (e) {
          console.error('Failed to load leads:', e);
        }
      }

      async bulkImport() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return alert('Select a CSV file');

        const formData = new FormData();
        formData.append('file', file);

        try {
          const res = await fetch(`${API_BASE}/import/csv`, { method: 'POST', body: formData });
          const data = await res.json();
          alert(`✓ Started import: ${data.operationId}`);
          this.loadStats();
        } catch (e) {
          alert(`❌ Import failed: ${e.message}`);
        }
      }

      async bulkScore() {
        try {
          const res = await fetch(`${API_BASE}/score/bulk`, { method: 'POST', body: JSON.stringify({ limit: 1000 }) });
          const data = await res.json();
          alert(`✓ Scoring started: ${data.operationId}`);
        } catch (e) {
          alert(`❌ Scoring failed: ${e.message}`);
        }
      }

      updateStatsUI() {
        const statsHtml = `
          <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="stat-card bg-white p-6 rounded-lg shadow">
              <p class="text-gray-600 text-sm mb-2">Total Leads</p>
              <p class="metric">${this.formatNumber(this.stats.total_leads)}</p>
            </div>
            <div class="stat-card bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
              <p class="text-gray-600 text-sm mb-2">Verified</p>
              <p class="metric text-green-600">${this.formatNumber(this.stats.verified_leads)}</p>
            </div>
            <div class="stat-card bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
              <p class="text-gray-600 text-sm mb-2">Avg Score</p>
              <p class="metric text-blue-600">${(this.stats.avg_score || 0).toFixed(1)}/100</p>
            </div>
            <div class="stat-card bg-white p-6 rounded-lg shadow border-l-4 border-purple-500">
              <p class="text-gray-600 text-sm mb-2">Companies</p>
              <p class="metric text-purple-600">${this.formatNumber(this.stats.unique_companies)}</p>
            </div>
          </div>
        `;
        const container = document.getElementById('stats');
        if (container) container.innerHTML = statsHtml;
      }

      updateLeadsUI() {
        const leadsHtml = `
          <div class="space-y-3 max-h-96 overflow-y-auto">
            ${this.leads.map(lead => `
              <div class="bg-white p-4 rounded border border-gray-200 flex justify-between items-center">
                <div>
                  <p class="font-semibold">${lead.name || 'Unknown'}</p>
                  <p class="text-sm text-gray-600">${lead.title} @ ${lead.company}</p>
                  <p class="text-xs text-gray-400">${lead.email}</p>
                </div>
                <div class="text-right">
                  <span class="inline-block bg-${this.getGradeColor(lead.grade)}-100 text-${this.getGradeColor(lead.grade)}-800 px-3 py-1 rounded-full text-sm font-medium">
                    ${lead.score || 0}/100 [${lead.grade || 'N/A'}]
                  </span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        const container = document.getElementById('leads-list');
        if (container) container.innerHTML = leadsHtml;
      }

      getGradeColor(grade) {
        const colors = { 'A': 'green', 'B': 'blue', 'C': 'yellow', 'D': 'orange', 'F': 'red' };
        return colors[grade] || 'gray';
      }

      formatNumber(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
      }

      render() {
        document.getElementById('app').innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-black">
            <!-- Header -->
            <div class="gradient-primary text-white py-8 px-8 shadow-lg">
              <div class="max-w-7xl mx-auto">
                <h1 class="text-4xl font-bold mb-2">🚀 Spectral Scraper</h1>
                <p class="text-lg opacity-90">Enterprise Lead Generation & Scoring Platform</p>
              </div>
            </div>

            <!-- Main Content -->
            <div class="max-w-7xl mx-auto px-8 py-10">
              <!-- Statistics -->
              <div id="stats"></div>

              <!-- Operations Panel -->
              <div class="grid grid-cols-2 gap-6 mb-8">
                <!-- Bulk Import -->
                <div class="card-hover bg-white p-6 rounded-lg shadow">
                  <h2 class="text-xl font-bold mb-4">📥 Bulk Import</h2>
                  <input type="file" id="csvFile" accept=".csv" class="w-full mb-4 p-2 border border-gray-300 rounded">
                  <button onclick="window.dashboard.bulkImport()" class="w-full gradient-primary text-white py-2 rounded font-semibold hover:opacity-90">
                    Import CSV
                  </button>
                  <p class="text-xs text-gray-500 mt-2">Supports: CSV with Name, Email, Phone, Title, Company</p>
                </div>

                <!-- Bulk Operations -->
                <div class="card-hover bg-white p-6 rounded-lg shadow">
                  <h2 class="text-xl font-bold mb-4">⚙️ Bulk Operations</h2>
                  <div class="space-y-2">
                    <button onclick="window.dashboard.bulkScore()" class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700">
                      Score All Leads
                    </button>
                    <button class="w-full bg-green-600 text-white py-2 rounded font-semibold hover:bg-green-700">
                      Verify All
                    </button>
                    <button class="w-full bg-purple-600 text-white py-2 rounded font-semibold hover:bg-purple-700">
                      Sync to CRM
                    </button>
                  </div>
                </div>
              </div>

              <!-- Recent Leads -->
              <div class="bg-white rounded-lg shadow p-6 mb-8">
                <h2 class="text-xl font-bold mb-4">👥 Top Recent Leads</h2>
                <div id="leads-list"></div>
              </div>

              <!-- Footer -->
              <div class="text-center text-gray-400 text-sm py-8 border-t border-gray-700">
                <p>Spectral Scraper v1.0 | Built for enterprise scale | Real-time processing</p>
              </div>
            </div>
          </div>
        `;

        // Attach dashboard instance for global access
        window.dashboard = this;
        this.updateStatsUI();
        this.updateLeadsUI();
      }
    }

    // Initialize dashboard
    new Dashboard();
  </script>
</body>
</html>
